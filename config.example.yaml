# Copy this file to config.yaml and fill in your real values.
# config.yaml is gitignored — never commit it.

timezone: America/Los_Angeles

calendars:
  - name: Personal
    ics_url: "https://calendar.google.com/calendar/ical/REPLACE_ME/private-XXXXXXXX/basic.ics"
    color: "#4285F4"
  - name: Work
    ics_url: "https://outlook.office365.com/owa/calendar/REPLACE_ME/calendar.ics"
    color: "#34A853"

working_hours_start: "06:00"
working_hours_end: "22:00"

# How often to re-fetch calendar feeds, in minutes
calendar_refresh_minutes: 10

# Port the Flask server listens on
port: 8080

# Path to the local tasks file (always read; shown alongside Asana tasks if both configured)
tasks_file: "data/tasks.json"

# How often to re-fetch Asana tasks, in minutes (only used when asana.enabled is true)
tasks_refresh_minutes: 5

# Asana adapter — set enabled: true and fill in your token + project IDs to use it.
# Get a Personal Access Token from https://app.asana.com/0/my-apps
# Project IDs are the numbers in the URL: app.asana.com/0/<project_id>/...
asana:
  enabled: false
  token: "YOUR_ASANA_PERSONAL_ACCESS_TOKEN"
  project_ids:
    - "1234567890123456"
